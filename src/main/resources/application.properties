spring.application.name=ms-citas-db
server.port=8092

spring.datasource.url=jdbc:mysql://localhost:3306/app_medica_citas?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# El esquema se crea mediante migraciones Flyway (src/main/resources/db/migration)
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration